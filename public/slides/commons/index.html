... and the year after that, the second increased to 7. With 13 cows on the hill, the grass looked very sad and the cows noticeably thinner.

## Tragedy of the Commons (~300BC)

<div style="display: flex; align-items: center;">
    <img src="img/Aristotle_(transparent).png" style="width: 300px;">
    <blockquote><strong>"For that which is common to the greatest number has the least care bestowed upon it."</strong><blockquote>

</div>

So it seems Artistotle also lived in a shared house once... Quote continues:

"Everybody thinks chiefly of their own, hardly at all of the common interest; and only when they are themself concerned as an individual. For besides other considerations, everybody is more inclined to neglect the duty which they expect another to fulfill"

## Tragedy of the Commons (1968)

<div style="display: flex; align-items: center;">
    <img src="img/garrett_hardin.webp" style="width: 300px;">
    <blockquote><strong>"Each person is locked into a system that compels them to increase their herd without limit - in a world that is limited."</strong><blockquote>
    <p class="ref">Hardin, G., 1968. The Tragedy of the Commons: The population problem has no technical solution; it requires a fundamental extension in morality. Science 162, 1243–1248. <a href="https://doi.org/10.1126/science.162.3859.1243">doi.org/10.1126/science.162.3859.1243</a></p>
</div>

???
The wildly popular paper by the rather nasty Hardin presented tragedy as an inevitable outcome: people can't be trusted to share resources responsibly. It was quoted thousands of times and strongly influenced policy in the imperial core and through 'development' into the peripheries - many have been dispossessed. (You may boo.)

Quote continues:

"Ruin is the destination toward which all people rush, each pursuing their own best interest in a society that believes in the freedom of the commons."

## Game theory

_Play Nicky Case's <a href="https://ncase.me/trust/">the evolution of trust</a> for a fun dive into Game Theory_

<img src="img/ncase_trust.png" >

???
Game theory abstracts concrete situations and provides a way to classify. "The Prisonner's dilemma" describes game situations which there is always an incentive to be exploitative rather than cooperative. I won't go into further here, but is an important part of Commons theory.

---

class: center

## Solution: external control

<img src="img/cowhill-policed.png" style="width: 80%">

???
With sharing theoretically discarded, there have been two main 'solutions' to the issue. The first relies on external authority to limit the resource use. Issues:
1. the indignity and trauma of dispossession (and resistance)
2. the authority likely understands the resource worse than the users: if it sets the limit too low, the users will likely ignore it; if they set it too high, they will be encouraged to graze more than they should
3. the authority will demand payment for the monitoring and enforcement it now provides 

---

class: center

## Solution: Privatization

<img src="img/cowhill-privatized.png" style="width: 80%">

???
The shared resource is privatized, each herder pays the full cost of overgrazing. Issues:
1. property is theft
2. building and maintaining the fence requires work - and cooperation!
3. if a conflict breaks out, who judges? (Answer: the local authority)

---

class: center

## Solution: Commons?

<img src="img/cowhill-cooperation.png" style="width: 65%">

???
"Can't we all just get along?" We all know and experience self-management! What if there was science behind it? What leads to the formation of a successful self-governing community?

## Governing the Commons (1990)

<div style="display: flex; align-items: center;">
    <img src="img/governing-the-commons.jpeg" style="width: 250px;">
    <div>
      <blockquote><em>CPR = common-pool resource ≈ commons</em></blockquote>
      <blockquote>"I focus entirely on <strong>small-scale</strong> CPRs ... <strong>located within one country</strong> [of] <strong>50 to 15,000 persons</strong> ... These CPRs are primarily <strong>inshore Fisheries, smaller grazing areas, groundwater basins, irrigation systems, and communal forests</strong>"<blockquote>
      <p class="ref">Ostrom, E., 1990. Governing the commons: the evolution of institutions for collective action, The Political economy of institutions and decisions. Cambridge University Press, Cambridge ; New York.</p>
    </div>
</div>

???
Arguably Ostrom's magnum opus, the work associated with her 'Nobel prize for economics' - she was the first woman to be awarded it. It covers her intellectual history, looks at concrete commons case studies, sets out game theoretical analysis and tabulates the famous 8 principles

---

## The 8 Design principles

## 📏 🎣 🤝 👁️‍🗨️ 📈 🌊 🔓 🪆

???
Looking through hundreds of successful, failing and failed commons, the team identified 8 features present in all successful cases.

*Original: _"Design principles illustrated by long-enduring CPR institutions"_

---

## 1. Clearly defined boundaries 📏
> "Individuals or households who have rights to withdraw resource units from the CPR must be clearly defined, as must the boundaries of the CPR itself."

> **Everyone knows who is sharing what.**

---

## 2. Appropriate rules* 🎣
> "Appropriation rules restricting time, place, technology, and/or quantity of resource units are related to local labor, material, and/or money"

> **There are rules that preserve the commons.**

???
Original*: _"Congruence between appropriation and provision rules and local conditions"_

---

## 3. Collective-choice arrangements 🤝
> "Most individuals affected by the operational rules can participate in modifying the operational rules."

> **The commoners make their rules.**

---

## 4. Monitoring 👁️‍🗨️
> "Monitors, who actively audit CPR conditions and appropriator behavior, are accountable to the appropriators or are the appropriators."

> **The commoners check their rules and resources.**

???
The cost of montitoring was often reduced through the design of rules. For example, the farmers at an irrigation system know the sequence of watering, and the one to receive the water next is present and self-interested that the one currently watering does not extend their watering.

---

## 5. Graduated sanctions 📈
> "Appropriators who violate operational rules are likely to be assessed graduated sanctions (depending on the seriousness and context of the offense) by other appropriators, by officials accountable to these appropriators, or by both."

> **The commoners address issues in gradual and appropriate ways.**

???
Exceptions during special circumstances are normal!

## Aside: monitoring & sanctions

~~Moralizing & punishment~~ → **system feedback**. Metaphor of riding a bike:
- **destination = rules**
- **looking = monitoring**
- **steering = sanctioning** (course correction)

<div style="display: flex; flex-direction: column; align-items: center;">
  <img src="img/Woman_riding_bike_through_Zaanse_Schans_long.jpg" width="80%">
  <em>Let's ride a bike instead!</em>
</div>

???
Think systems not individuals. Think restorative justice, not punitive. Think Tekmîl, not struggle sessions... Monitor, sanction and become a "good protector of the commons"!

---

## 6. Conflict-resolution mechanisms 🌊
> "Appropriators and their officials have rapid access to low-cost local arenas to resolve conflicts among appropriators or between appropriators and officials."

> **The commoners have quick access to conflict-resolution.**

---

## 7. Minimal recognition of rights to organize 🔓
> "The rights of appropriators to devise their own institutions are not challenged by external governmental authorities."

> **The commoners do what is necessary to please the authorities.**

???
This is why squats and occupations don't endure :(

---

_For CPRs that are parts of larger systems_

## 8. Nested enterprises 🪆
> "Appropriation, provision, monitoring, enforcement, conflict resolution, and governance activities are organized in multiple layers of nested enterprises."

> **The previous principles are represented at every level or organizing.**

## Note
- **intergenerational communities: higher trust**
- **significant similarity: lower conflict potential**
- **entrenched discrimination**

???
"the populations in these locations have remained stable over long periods of time. Individuals have shared a past and expect to share a future. It is important for individuals to maintain their reputations as reliable members of the community."

"None of these situations involves participants who vary greatly in regard to ownership of assets, skills, knowledge, ethnicity, race, or other variables that could strongly divide a group of individuals"

"In the Swiss mountains, appropriation rights and provision duties are inherited by individual males who own private property in the village and remain citizens of the village."
